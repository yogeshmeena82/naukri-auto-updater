name: Naukri Resume Auto-Update

on:
  schedule:
    - cron: '50 3 * * *'   # 9:20 AM IST  (IST = UTC+5:30)
    - cron: '30 3 * * *'   # 9:00 AM IST  (IST = UTC+5:30)
    - cron: '30 7 * * *'   # 1:00 PM IST
    - cron: '30 12 * * *'  # 6:00 PM IST
  workflow_dispatch:         # allows manual trigger anytime

jobs:
  update-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run Resume Update
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
          NAUKRI_HEADLESS: "true"
          NAUKRI_RESUME_SOURCE: "resume/"
          NAUKRI_RESUME_FILENAME_FORMAT: "VriseResume_{day}{mon}{year}"
        run: python naukri_auto_update.py --once
