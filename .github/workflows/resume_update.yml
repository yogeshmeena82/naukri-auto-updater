name: Naukri Resume Auto-Update

on:
  schedule:
    # Times are UTC. These line up with IST 9AM/9:40AM/1PM/6PM.
    - cron: "30 3 * * *"
    - cron: "10 4 * * *"
    - cron: "30 7 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch: {}

jobs:
  update-resume:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Naukri resume updater
        id: update
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
          NAUKRI_HEADLESS: "true"
          NAUKRI_RESUME_SOURCE: "./resume.pdf"
          NAUKRI_ALLOW_DIRECT_FALLBACK: "false"
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
        run: python naukri_auto_update.py --once

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-debug-${{ github.run_id }}
          path: |
            /tmp/naukri_resume_debug/
            resume_update_log.txt
          retention-days: 7

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-log-${{ github.run_id }}
          path: resume_update_log.txt
          retention-days: 7
